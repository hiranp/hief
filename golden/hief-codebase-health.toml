# Golden Set: HIEF Codebase Health
#
# Machine-verifiable quality checks for the HIEF codebase itself.
# Uses both literal substring and structural (ast-grep) checks.

[metadata]
name = "hief-codebase-health"
description = "Core quality guardrails for the HIEF codebase. Checks error handling, documentation, architecture rules, and anti-patterns using both literal and structural matching."

# ---------------------------------------------------------------------------
# Critical: Error Handling
# ---------------------------------------------------------------------------

[[cases]]
id = "err-01"
name = "No bare .unwrap() in production code (structural)"
priority = "critical"

[cases.checks]
file_patterns = ["src/**/*.rs"]
structural_must_not_contain = [
    "rust:$X.unwrap()",
]

[[cases]]
id = "err-02"
name = "Error types use thiserror"
priority = "high"

[cases.checks]
must_contain = ["thiserror"]
file_patterns = ["src/errors.rs"]

[[cases]]
id = "err-03"
name = "HiefError type exists"
priority = "critical"

[cases.checks]
must_contain = ["pub enum HiefError"]
file_patterns = ["src/errors.rs"]

# ---------------------------------------------------------------------------
# High: Architecture
# ---------------------------------------------------------------------------

[[cases]]
id = "arch-01"
name = "No unsafe blocks in production code"
priority = "high"

[cases.checks]
file_patterns = ["src/**/*.rs"]
structural_must_not_contain = [
    "rust:unsafe { $$$BODY }",
]

[[cases]]
id = "arch-02"
name = "MCP server handler is implemented"
priority = "critical"

[cases.checks]
must_contain = ["impl ServerHandler for HiefServer"]
file_patterns = ["src/mcp/*.rs"]

[[cases]]
id = "arch-03"
name = "Database uses libsql (not raw sqlite)"
priority = "high"

[cases.checks]
must_contain = ["libsql"]
file_patterns = ["src/db.rs"]

# ---------------------------------------------------------------------------
# Medium: Code Quality Patterns
# ---------------------------------------------------------------------------

[[cases]]
id = "qual-01"
name = "All modules have module-level documentation"
priority = "medium"

[cases.checks]
must_contain = ["//!"]
file_patterns = ["src/eval/mod.rs"]

[[cases]]
id = "qual-02"
name = "Eval scorer supports structural patterns"
priority = "high"

[cases.checks]
must_contain = ["structural_must_contain", "structural_must_not_contain"]
file_patterns = ["src/eval/scorer.rs"]

[[cases]]
id = "qual-03"
name = "Golden sets support structural checks"
priority = "high"

[cases.checks]
must_contain = ["structural_must_contain", "structural_must_not_contain"]
file_patterns = ["src/eval/golden.rs"]

# ---------------------------------------------------------------------------
# Medium: Search Capabilities
# ---------------------------------------------------------------------------

[[cases]]
id = "search-01"
name = "FTS5 search is implemented"
priority = "high"

[cases.checks]
must_contain = ["chunks_fts"]
file_patterns = ["src/index/search.rs"]

[[cases]]
id = "search-02"
name = "Structural search via ast-grep exists"
priority = "high"

[cases.checks]
must_contain = ["AstGrep", "Pattern"]
file_patterns = ["src/index/structural.rs"]

[[cases]]
id = "search-03"
name = "MCP tools expose structural_search"
priority = "high"

[cases.checks]
must_contain = ["structural_search"]
file_patterns = ["src/mcp/tools.rs"]

# ---------------------------------------------------------------------------
# Low: Diff-based evaluation support
# ---------------------------------------------------------------------------

[[cases]]
id = "diff-01"
name = "Diff-based evaluation is supported"
priority = "medium"

[cases.checks]
must_contain = ["diff_only", "get_changed_files"]
file_patterns = ["src/eval/scorer.rs"]
