<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HIEF UI{% endblock %}</title>
  <style>
    :root {
      --bg-base: #09090b;
      --bg-surface: #18181b;
      --bg-surface-hover: #27272a;
      --border-color: #27272a;
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --accent: #3b82f6;
      --accent-alt: #8b5cf6;
      --accent-soft: rgba(59, 130, 246, 0.12);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .app-shell {
      display: flex;
      min-height: 100vh;
      background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.07), transparent 40%), var(--bg-base);
    }
    .sidebar {
      width: 260px;
      flex: 0 0 260px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border-color);
      padding: 24px 14px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
      padding: 0 10px;
    }
    .brand-mark {
      width: 26px;
      height: 26px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), var(--accent-alt));
      box-shadow: 0 0 18px rgba(59, 130, 246, 0.35);
    }
    .nav-title {
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      padding: 0 10px;
    }
    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .nav-item {
      text-decoration: none;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      font-size: 14px;
      font-weight: 600;
      transition: 0.18s ease;
    }
    .nav-item:hover {
      color: var(--text-main);
      border-color: var(--border-color);
      background: var(--bg-surface-hover);
    }
    .nav-item.active {
      color: var(--text-main);
      border-color: rgba(59, 130, 246, 0.22);
      background: var(--accent-soft);
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .nav-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.65;
    }
    .content {
      flex: 1;
      min-width: 0;
      padding: 28px 34px;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .page-title {
      font-size: 28px;
      line-height: 1.1;
      margin: 0;
      letter-spacing: -0.45px;
      font-weight: 650;
    }
    .health-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      color: var(--success);
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.26);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .health-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.45); }
      70% { box-shadow: 0 0 0 7px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    .card {
      background: rgba(24, 24, 27, 0.8);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 18px;
      backdrop-filter: blur(8px);
    }
    h1, h2, h3 { margin: 0 0 12px; }
    h2 { font-size: 22px; letter-spacing: -0.02em; }
    h3 { font-size: 16px; letter-spacing: -0.01em; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left;
      padding: 11px 8px;
      border-bottom: 1px solid var(--border-color);
      font-size: 14px;
      vertical-align: top;
    }
    th {
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 12px;
      font-weight: 700;
    }
    a { color: #93c5fd; }
    a:hover { color: #bfdbfe; }
    .muted { color: var(--text-muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border-color);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.03em;
      background: rgba(255, 255, 255, 0.03);
    }
    .status-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.8;
    }
    .status-draft { color: var(--text-muted); }
    .status-approved { color: #22d3ee; }
    .status-in_progress { color: var(--accent); }
    .status-in_review { color: var(--accent-alt); }
    .status-verified { color: var(--success); }
    .status-merged { color: #34d399; }
    .status-rejected { color: var(--danger); }
    .status-blocked { color: var(--warning); }
    .action,
    .btn {
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: 0.18s ease;
    }
    .btn-primary,
    .action-primary {
      color: #eff6ff;
      border-color: rgba(59, 130, 246, 0.42);
      background: linear-gradient(180deg, #3b82f6, #2563eb);
    }
    .action:hover,
    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
    }
    .btn-primary:hover,
    .action-primary:hover {
      background: linear-gradient(180deg, #60a5fa, #2563eb);
      border-color: rgba(59, 130, 246, 0.5);
    }
    @media (max-width: 980px) {
      .sidebar { width: 86px; flex-basis: 86px; }
      .brand { font-size: 0; padding: 0; justify-content: center; }
      .brand-mark { width: 30px; height: 30px; }
      .nav-title { display: none; }
      .nav-item { justify-content: center; font-size: 0; gap: 0; }
      .nav-dot { width: 10px; height: 10px; }
      .content { padding: 22px; }
    }
    @media (max-width: 720px) {
      .app-shell { flex-direction: column; }
      .sidebar {
        width: 100%;
        flex: 0 0 auto;
        border-right: 0;
        border-bottom: 1px solid var(--border-color);
        padding: 14px;
      }
      .nav-list { flex-direction: row; }
      .nav-item { flex: 1; font-size: 13px; justify-content: center; }
      .content { padding: 16px; }
      .page-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        HIEF
      </div>
      <div class="nav-title">Workspace</div>
      <nav class="nav-list" aria-label="Primary">
        <a class="nav-item {% block nav_dashboard %}{% endblock %}" href="/ui"><span class="nav-dot" aria-hidden="true"></span>Dashboard</a>
        <a class="nav-item {% block nav_intents %}{% endblock %}" href="/ui"><span class="nav-dot" aria-hidden="true"></span>Intents</a>
        <a class="nav-item {% block nav_worktrees %}{% endblock %}" href="/ui/worktrees"><span class="nav-dot" aria-hidden="true"></span>Worktrees</a>
      </nav>
    </aside>
    <main class="content">
      <div class="page-header">
        <h1 class="page-title">{% block page_title %}HIEF Task Tracking{% endblock %}</h1>
        <div class="health-badge"><span class="health-dot" aria-hidden="true"></span>MCP Server Active</div>
      </div>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
