# HIEF Production Baseline Golden Set
# Goal: stable, low-noise safety checks that gate regressions in CI.

[metadata]
name = "hief-core-baseline"
description = "Production baseline guardrails for runtime, index, MCP, and docs workflow"

[[cases]]
id = "tokio-runtime-only"
name = "Runtime entrypoint stays tokio"
priority = "critical"
[cases.checks]
must_contain = ["#[tokio::main]"]
must_not_contain = ["async_std"]
file_patterns = ["src/main.rs"]

[[cases]]
id = "no-unsafe-blocks"
name = "No unsafe blocks in runtime code"
priority = "critical"
[cases.checks]
# Use a structural pattern so we detect real unsafe blocks and skip
# occurrences inside string literals (e.g. the conventions template
# in `src/cli/commands/init.rs` embeds `"unsafe { $$$BODY }"`).
structural_must_not_contain = ["rust:unsafe { $$$BODY }"]
file_patterns = ["src/**/*.rs"]

[[cases]]
id = "fts-index-stays-present"
name = "FTS5 chunk index migration remains present"
priority = "high"
[cases.checks]
must_contain = ["CREATE VIRTUAL TABLE IF NOT EXISTS chunks_fts"]
file_patterns = ["src/db.rs"]

[[cases]]
id = "mcp-core-stays-wired"
name = "MCP stack remains wired"
priority = "high"
[cases.checks]
must_contain = ["use rmcp::"]
file_patterns = ["src/mcp/tools.rs"]

[[cases]]
id = "docs-template-workflow-anchor"
name = "Docs generation workflow anchor remains"
priority = "medium"
[cases.checks]
must_contain = ["hief docs generate"]
file_patterns = ["src/docs/mod.rs"]
