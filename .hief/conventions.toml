# HIEF Project Conventions
#
# Machine-readable project rules that agents MUST follow when writing code.
# These replace prose specification documents with verifiable patterns.
#
# Format per rule:
#   [rule_name]
#   description = "Human-readable explanation"
#   check_pattern = "ast-grep pattern or literal check"
#   language = "rust"           # Language for structural patterns
#   scope = "src/**/*.rs"       # File glob this applies to
#   exclude = ["tests/**"]      # Optional exclusions
#   severity = "error"          # error | warning | info
#   rationale = "Why this rule exists"

# ---------------------------------------------------------------------------
# Error Handling
# ---------------------------------------------------------------------------

[error_handling.no_unwrap]
description = "No bare .unwrap() in production code"
check_pattern = "$X.unwrap()"
language = "rust"
scope = "src/**/*.rs"
exclude = ["src/**/tests.rs", "tests/**"]
severity = "error"
rationale = "Bare unwrap() panics on failure. Use ? or .expect() with context."

[error_handling.no_bare_expect]
description = "Prefer descriptive expect messages or ? over bare expect"
check_pattern = "$X.expect($MSG)"
language = "rust"
scope = "src/**/*.rs"
exclude = ["src/**/tests.rs", "tests/**"]
severity = "warning"
rationale = "expect() is acceptable but messages should be descriptive, not generic."

[error_handling.result_types]
description = "All public functions return Result<T, HiefError> or are simple getters"
check_pattern = "pub fn $NAME($$$) -> Result<$RET, HiefError>"
language = "rust"
scope = "src/**/*.rs"
severity = "info"
rationale = "Consistent error types enable ? propagation and clear error reporting."

# ---------------------------------------------------------------------------
# Documentation
# ---------------------------------------------------------------------------

[documentation.public_doc_comments]
description = "All public functions and types must have /// doc comments"
check_pattern = "/// $DOC"
language = "rust"
scope = "src/**/*.rs"
severity = "warning"
rationale = "Doc comments power IDE tooltips, docs.rs, and agent context retrieval."

[documentation.module_docs]
description = "Every module file must start with //! module-level documentation"
check_pattern = "//! $DOC"
language = "rust"
scope = "src/**/*.rs"
severity = "warning"
rationale = "Module docs explain purpose and are indexed by HIEF for search."

# ---------------------------------------------------------------------------
# Architecture
# ---------------------------------------------------------------------------

[architecture.no_unsafe]
description = "No unsafe blocks without documented safety invariants"
check_pattern = "unsafe { $$$BODY }"
language = "rust"
scope = "src/**/*.rs"
severity = "error"
rationale = "unsafe requires explicit safety justification in a comment above the block."

[architecture.no_network_in_core]
description = "Core logic must not make network calls — offline operation is mandatory"
scope = "src/index/**/*.rs, src/eval/**/*.rs, src/graph/**/*.rs"
severity = "error"
rationale = "HIEF is local-first. Network calls belong only in src/mcp/ transport layer."

[architecture.async_runtime]
description = "Use tokio as the only async runtime (not async-std)"
scope = "Cargo.toml"
severity = "error"
rationale = "Single runtime avoids executor conflicts and simplifies dependency tree."

# ---------------------------------------------------------------------------
# Code Structure
# ---------------------------------------------------------------------------

[structure.module_reexports]
description = "mod.rs files re-export public items for clean API surface"
scope = "src/**/mod.rs"
severity = "info"
rationale = "Clean re-exports make the crate API discoverable."

[structure.test_modules]
description = "Every source file should have a #[cfg(test)] mod tests block"
check_pattern = "#[cfg(test)]"
language = "rust"
scope = "src/**/*.rs"
exclude = ["src/**/mod.rs"]
severity = "warning"
rationale = "Co-located tests ensure each module is independently testable."

# ---------------------------------------------------------------------------
# Dependencies
# ---------------------------------------------------------------------------

[dependencies.minimize_deps]
description = "Minimize dependency count; prefer stdlib + established crates"
scope = "Cargo.toml"
severity = "info"
rationale = "Fewer deps = faster builds, smaller binary, fewer supply chain risks."

[dependencies.pin_parser_crates]
description = "Pin versions for grammar/parser crates to avoid cc conflicts"
scope = "Cargo.toml"
severity = "error"
rationale = "tree-sitter grammar crates use cc for native compilation; version mismatches break builds."

# ---------------------------------------------------------------------------
# Process
# ---------------------------------------------------------------------------

[process.intent_traceability]
description = "Non-trivial changes must trace to an approved intent"
severity = "warning"
rationale = "Intent traceability enables audit trails and multi-agent coordination."

[process.no_self_approval]
description = "No agent may approve its own intent"
severity = "error"
rationale = "Self-approval defeats the purpose of review gates."

[process.golden_set_regressions]
description = "Golden set score regressions block merge"
severity = "error"
rationale = "Quality guardrails are only useful if they're enforced."
