name: Bug Report
description: Report a bug to help us improve HIEF
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Bug description
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run 'hief init'
        2. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS version, Rust version, HIEF version.
      placeholder: |
        - OS: macOS 15.0
        - Rust: 1.85.0
        - HIEF: 0.2.5
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please include any relevant logs or terminal output. Use code blocks to format them.
      placeholder: |
        ```
        <paste logs here>
        ```
