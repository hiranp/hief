# .github/copilot-agents.yml
# GitHub Copilot Agents configuration for the HIEF-powered repository.
# Each entry is a lightweight helper to invoke the local CLI and remind
the user of workflow best practices.

version: "1.0"
agents:
  - name: SearchCode
    description: "Run `hief index search` against the local index. Use this before editing."
    command: |
      echo "Usage: hief index search <query>"
  - name: StructuralSearch
    description: "Run `hief index structural` using ast-grep patterns."
    command: |
      echo "Usage: hief index structural <pattern> --language <lang>"
  - name: CreateIntent
    description: "Start a new graph intent. Supply kind, title, and description."
    command: |
      echo "hief graph create --kind feature --title \"$1\" --description \"$2\""
  - name: UpdateIntent
    description: "Change the status of an existing intent (in_progress, in_review, etc.)."
    command: |
      echo "hief graph update --id \"$1\" --status \"$2\""
  - name: RunEvaluation
    description: "Evaluate current work against golden sets or using LLM judge."
    command: |
      echo "hief eval run"
  - name: DocsGenerate
    description: "Generate a document from a template (constitution, spec, harness)."
    command: |
      echo "hief docs generate <template> --name <name>"
  - name: StartMCP
    description: "Launch the HIEF MCP server (stdio transport default)."
    command: |
      hief serve
  - name: Build
    description: "Compile the project in debug or release mode."
    command: |
      echo "cargo build --release"
  - name: Format
    description: "Check or apply rustfmt formatting."
    command: |
      echo "cargo fmt -- --check"
  - name: Lint
    description: "Run Clippy to catch warnings and improve code quality."
    command: |
      echo "cargo clippy --all-targets --all-features -- -D warnings"
  - name: Test
    description: "Execute the unit test suite."
    command: |
      echo "cargo test"

hints:
  - "Always create or update an intent (hief graph) before editing code."
  - "Break tasks into small, reviewable intents."
  - "Run evaluations (`hief eval run`) before requesting human review."
  - "Use `hief index structural` to find anti-patterns like bare `.unwrap()`."
  - "Commit and push results regularly; the git history is the memory."
  - "Refer to AGENTS.md in the project root for detailed workflow and additional tools."
  - "Use `cargo fmt`, `cargo clippy`, and `cargo test` frequently to maintain code hygiene."
  - "Scaffold documentation using `hief docs generate` before implementing features."